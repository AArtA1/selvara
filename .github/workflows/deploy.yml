name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /srv/selvara

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Backend ──"
            cd selvara-backend
            npm ci --production
            npm run build
            pm2 restart selvara-backend || pm2 start npm --name selvara-backend -- run start
            cd ..

            echo "── Frontend ──"
            cd mattress-store
            npm ci
            npm run build
            pm2 restart selvara-frontend || pm2 start npm --name selvara-frontend -- run start
            cd ..

            echo "── Done ──"
